<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryScript</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e10;--surf:#18181c;--surf2:#222228;--surf3:#2a2a32;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --txt:#f0f0f2;--txt2:#9090a0;--txt3:#55556a;
  --nb:#1a1428;--nbr:#4a3a8a;--na:#8b6dff;--nl:#c4aaff;
  --sb:#1a1208;--sbr:#7a5a10;--sa:#f5a623;--sl:#ffd080;
  --cb:#0d1a14;--cbr:#1a5a3a;--cl:#7fffc4;
  --ntb:#111820;--ntbr:#1a3a5a;--ntl:#7fb8ff;
  --red:#ff4d4d;--r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}

/* SCREENS */
#home,#editor{position:absolute;inset:0;display:none}
#home.show{display:flex;flex-direction:column}
#editor.show{display:flex;flex-direction:row}

/* HOME */
.home-nav{padding:20px 40px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700}
.logo-icon{width:32px;height:32px;background:var(--na);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.home-scroll{flex:1;overflow-y:auto;padding:40px}
.home-scroll::-webkit-scrollbar{width:4px}
.home-scroll::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px}
.home-inner{max-width:900px;margin:0 auto}
.new-btn{width:100%;background:var(--nb);border:1px solid var(--nbr);border-radius:var(--rl);padding:20px 24px;display:flex;align-items:center;gap:16px;cursor:pointer;margin-bottom:32px;transition:all 0.15s;text-align:left}
.new-btn:hover{background:rgba(139,109,255,0.18);border-color:var(--na)}
.new-btn-icon{width:46px;height:46px;background:rgba(139,109,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--nl);flex-shrink:0}
.new-btn-title{font-size:15px;font-weight:700;color:var(--nl);margin-bottom:3px}
.new-btn-sub{font-size:12px;color:var(--txt3)}
.section-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--txt3);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:14px}
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pcard{background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--rl);padding:18px 20px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.pcard:hover{border-color:var(--nbr);background:var(--surf2);transform:translateY(-1px)}
.pcard-emoji{font-size:24px;margin-bottom:10px}
.pcard-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcard-meta{font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace;margin-bottom:10px}
.pcard-chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;background:var(--surf3);color:var(--txt3);font-family:'DM Mono',monospace}
.pcard-btns{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
.pcard:hover .pcard-btns{opacity:1}
.pcbtn{padding:3px 8px;border-radius:6px;font-size:10px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;border:1px solid var(--bdr2);background:var(--surf3);color:var(--txt2);transition:all 0.15s}
.pcbtn:hover{color:var(--txt)}
.pcbtn.red:hover{border-color:var(--red);color:var(--red)}
.import-btn{padding:8px 16px;background:transparent;border:1px solid var(--bdr2);border-radius:var(--r);color:var(--txt2);font-size:12px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s}
.import-btn:hover{color:var(--txt)}

/* EDITOR */
.sidebar{width:230px;min-width:230px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column}
.sb-top{padding:14px;border-bottom:1px solid var(--bdr)}
.back-btn{display:flex;align-items:center;gap:7px;background:none;border:none;color:var(--txt3);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;padding:5px 7px;border-radius:var(--r);transition:all 0.15s;width:100%;text-align:left;margin-bottom:8px}
.back-btn:hover{background:var(--surf2);color:var(--txt)}
.proj-name-disp{font-size:13px;font-weight:700;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:2px;cursor:pointer;border-radius:5px;transition:color 0.15s}
.proj-name-disp:hover{color:var(--nl)}
.proj-scene-ct{font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace;margin-top:2px;padding:2px}
.sb-tabs{display:flex;border-bottom:1px solid var(--bdr)}
.sb-tab{flex:1;padding:8px 4px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;background:none;border:none;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.sb-tab:hover{color:var(--txt2)}
.sb-tab.on{color:var(--nl);border-bottom-color:var(--na)}
.sb-panel{display:none;flex:1;overflow-y:auto;flex-direction:column}
.sb-panel.on{display:flex}
.sb-panel::-webkit-scrollbar{width:3px}
.sb-panel::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:3px}
.scene-list{padding:8px 6px;display:flex;flex-direction:column;gap:2px}
.si{padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:7px;font-weight:500;transition:background 0.1s;border:none;background:none;text-align:left;width:100%;font-family:'Syne',sans-serif}
.si:hover{background:var(--surf2);color:var(--txt)}
.si.on{background:var(--surf3);color:var(--txt)}
.si-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt3);min-width:18px}
.si-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.roster-scroll{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.ccard{background:var(--surf2);border-radius:var(--r);border:1px solid var(--bdr2);overflow:hidden}
.ccard-top{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--bdr)}
.cav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0}
.cname{flex:1;background:transparent;border:none;font-size:12px;font-weight:700;color:var(--txt);font-family:'Syne',sans-serif;outline:none}
.cname::placeholder{color:var(--txt3)}
.cdel{background:transparent;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:2px 4px;font-family:'Syne',sans-serif}
.cdel:hover{color:var(--red)}
.cswatches{padding:6px 10px 8px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--bdr)}
.sw{width:14px;height:14px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:transform 0.1s;border:none}
.sw:hover{transform:scale(1.3)}
.cnotes{width:100%;background:transparent;border:none;padding:7px 10px;font-size:11px;color:var(--txt2);font-family:'Syne',sans-serif;resize:none;overflow:hidden;min-height:40px;line-height:1.5}
.cnotes:focus{outline:none}
.cnotes::placeholder{color:var(--txt3)}
.sb-bot{padding:8px;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:5px}
.sbbtn{padding:9px;background:transparent;border:1px dashed var(--bdr2);border-radius:var(--r);color:var(--txt2);font-size:12px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s}
.sbbtn:hover{border-color:var(--na);color:var(--nl);background:rgba(139,109,255,0.06)}
.sbbtn2{padding:8px;background:transparent;border:1px solid var(--bdr);border-radius:var(--r);color:var(--txt3);font-size:12px;font-family:'Syne',sans-serif;cursor:pointer;text-align:center;transition:all 0.15s}
.sbbtn2:hover,.sbbtn2.on{color:var(--cl);border-color:var(--cbr);background:var(--cb)}
.frow{display:flex;gap:5px}
.fbtn{flex:1;padding:7px;background:transparent;border:1px solid var(--bdr);border-radius:var(--r);color:var(--txt3);font-size:11px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s}
.fbtn:hover{border-color:var(--nbr);color:var(--nl)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:14px}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px}
.topbar{display:flex;align-items:center;gap:10px}
.stitle{flex:1;font-size:20px;font-weight:700;background:transparent;border:none;color:var(--txt);font-family:'Syne',sans-serif;outline:none}
.stitle::placeholder{color:var(--txt3)}
.navg{display:flex;gap:6px}
.navbtn{padding:6px 13px;background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--r);color:var(--txt2);font-size:11px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s}
.navbtn:hover{background:var(--surf2);color:var(--txt)}
.delbtn{padding:6px 10px;background:transparent;border:1px solid transparent;border-radius:var(--r);color:var(--txt3);font-size:11px;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.15s}
.delbtn:hover{border-color:var(--red);color:var(--red)}
.pdfbtn{padding:6px 13px;background:transparent;border:1px solid var(--bdr2);border-radius:var(--r);color:var(--txt2);font-size:11px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s}
.pdfbtn:hover{background:var(--cb);border-color:var(--cbr);color:var(--cl)}

/* BLOCKS */
.block{border-radius:var(--rl);border:1px solid var(--bdr);overflow:hidden;margin-bottom:0}
.block.nb{border-color:var(--nbr);background:var(--nb)}
.block.sb{border-color:var(--sbr);background:var(--sb)}
.block.cb2{border-color:var(--cbr);background:var(--cb)}
.block.ntb{border-color:var(--ntbr);background:var(--ntb)}
.bh{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr)}
.nb .bh{border-bottom-color:var(--nbr)}
.sb .bh{border-bottom-color:var(--sbr)}
.cb2 .bh{border-bottom-color:var(--cbr)}
.ntb .bh{border-bottom-color:var(--ntbr)}
.bh-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.blbl{font-size:10px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;font-family:'DM Mono',monospace}
.nb .blbl{color:var(--nl)}
.sb .blbl{color:var(--sl)}
.cb2 .blbl{color:var(--cl)}
.ntb .blbl{color:var(--ntl)}
.btitle-inp{background:transparent;border:none;outline:none;font-size:12px;color:var(--txt2);font-family:'Syne',sans-serif;font-weight:500;width:100%}
.btitle-inp::placeholder{color:var(--txt3)}
.btitle-inp:hover,.btitle-inp:focus{color:var(--txt)}
.bdel{background:transparent;border:none;color:var(--txt3);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:5px;flex-shrink:0}
.bdel:hover{color:var(--red)}
.col-heads{display:grid;background:rgba(0,0,0,0.2);border-bottom:1px solid var(--bdr)}
.ch{padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;color:var(--txt3);border-right:1px solid var(--bdr)}
.ch:last-child{border-right:none}
.row-wrap{display:grid;border-bottom:1px solid var(--bdr);position:relative;align-items:start}
.row-wrap:last-of-type{border-bottom:none}
.rcell{border-right:1px solid var(--bdr);display:flex;flex-direction:column;min-height:80px}
.rcell:last-child{border-right:none}
.rdel{position:absolute;top:6px;right:6px;background:var(--surf3);border:1px solid var(--bdr2);color:var(--txt3);cursor:pointer;font-size:10px;padding:3px 7px;border-radius:5px;opacity:0;transition:opacity 0.15s;z-index:2;font-family:'Syne',sans-serif}
.row-wrap:hover .rdel{opacity:1}
.rdel:hover{color:var(--red)!important;border-color:var(--red)}
textarea.auto{width:100%;background:transparent;border:none;padding:9px 12px;font-size:13px;color:var(--txt);font-family:'Syne',sans-serif;line-height:1.65;resize:none;overflow:hidden;min-height:80px;display:block}
textarea.auto:focus{outline:none;background:rgba(255,255,255,0.015)}
textarea.auto::placeholder{color:var(--txt3)}
textarea.note-ta{width:100%;background:transparent;border:none;padding:12px 14px;font-size:13px;color:var(--txt2);font-family:'Syne',sans-serif;resize:none;overflow:hidden;min-height:44px;height:44px;line-height:1.6;display:block}
textarea.note-ta:focus{outline:none;color:var(--txt)}
textarea.note-ta::placeholder{color:var(--txt3)}
.sname-bar{padding:5px 10px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;border-bottom:1px solid var(--bdr)}
.pills-bar{padding:8px 12px;border-bottom:1px solid var(--bdr);background:rgba(0,0,0,0.15);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.plbl{font-size:9px;font-family:'DM Mono',monospace;color:var(--txt3);letter-spacing:0.07em;text-transform:uppercase;white-space:nowrap}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid transparent;transition:all 0.15s;background:none}
.pill-empty{font-size:11px;color:var(--txt3);font-style:italic}
.add-row-bar{padding:10px 14px;border-top:2px solid var(--bdr2);background:rgba(0,0,0,0.18);display:flex;align-items:center;gap:8px}
.arb{background:transparent;border:1px dashed var(--bdr2);color:var(--txt2);font-size:12px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;padding:6px 14px;border-radius:7px;transition:all 0.15s}
.arb:hover{color:var(--nl);border-color:var(--nbr);background:rgba(139,109,255,0.08)}
.arb.s:hover{color:var(--sl);border-color:var(--sbr);background:rgba(245,166,35,0.08)}
.trow{display:flex;align-items:center;border-top:1px solid var(--bdr)}
.tlbl{font-size:9px;font-family:'DM Mono',monospace;color:var(--txt3);padding:9px 12px;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;border-right:1px solid var(--bdr)}
.tinp{flex:1;background:transparent;border:none;padding:9px 12px;font-size:13px;color:var(--txt);font-family:'Syne',sans-serif;outline:none}
.tinp::placeholder{color:var(--txt3)}
.add-area{padding:4px 0 8px}
.add-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--txt3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:9px}
.add-btns{display:flex;gap:8px}
.ab{padding:8px 16px;border-radius:var(--r);font-size:12px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s}
.abn{background:var(--nb);border-color:var(--nbr);color:var(--nl)}
.abn:hover{background:rgba(139,109,255,0.2);border-color:var(--na)}
.abs{background:var(--sb);border-color:var(--sbr);color:var(--sl)}
.abs:hover{background:rgba(245,166,35,0.2);border-color:var(--sa)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--txt3);font-size:13px;text-align:center}
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
.cf{display:flex;flex-direction:column;gap:5px}
.cl2{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt3);font-family:'DM Mono',monospace}
.cred-grid textarea,.cred-grid input[type=text]{background:rgba(0,0,0,0.3);border:1px solid var(--bdr2);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--txt);font-family:'Syne',sans-serif;width:100%}
.cred-grid textarea{resize:vertical;min-height:70px}
.cred-grid input[type=text]{height:38px}
.cred-grid textarea:focus,.cred-grid input:focus{outline:none;border-color:var(--cbr)}
.cred-grid textarea::placeholder,.cred-grid input::placeholder{color:var(--txt3)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt);padding:10px 20px;border-radius:10px;font-size:13px;font-family:'Syne',sans-serif;z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="home-nav">
    <div class="logo"><div class="logo-icon">✦</div>StoryScript</div>
    <div style="display:flex;gap:8px">
      <button class="import-btn" onclick="document.getElementById('imp').click()">↑ Import .animscript</button>
      <input type="file" id="imp" accept=".animscript,.json" style="display:none" onchange="importProj(this)">
    </div>
  </div>
  <div class="home-scroll">
    <div class="home-inner">
      <button class="new-btn" onclick="createProj()">
        <div class="new-btn-icon">+</div>
        <div>
          <div class="new-btn-title">New animation project</div>
          <div class="new-btn-sub">Start a fresh script from scratch</div>
        </div>
      </button>
      <div class="section-lbl" id="proj-count-lbl">Recent projects</div>
      <div class="proj-grid" id="proj-grid"></div>
    </div>
  </div>
</div>

<!-- EDITOR -->
<div id="editor">
  <div class="sidebar">
    <div class="sb-top">
      <button class="back-btn" onclick="goHome()">← All projects</button>
      <div class="proj-name-disp" id="pname" onclick="renameCurProj()" title="Click to rename">Untitled Project</div>
      <div class="proj-scene-ct" id="pcount">0 scenes</div>
    </div>
    <div class="sb-tabs">
      <button class="sb-tab on" id="tab-scenes" onclick="switchTab('scenes',this)">Scenes</button>
      <button class="sb-tab" id="tab-roster" onclick="switchTab('roster',this)">Characters</button>
    </div>
    <div class="sb-panel on" id="panel-scenes">
      <div class="scene-list" id="scene-list"></div>
    </div>
    <div class="sb-panel" id="panel-roster">
      <div class="roster-scroll" id="roster-body"></div>
      <button class="sbbtn" style="margin:8px" onclick="addChar()">+ Add Character</button>
    </div>
    <div class="sb-bot">
      <button class="sbbtn" onclick="addScene()">+ New Scene</button>
      <div class="frow">
        <button class="fbtn" onclick="saveFile()">↓ Save file</button>
        <button class="fbtn" onclick="document.getElementById('ldinp').click()">↑ Load</button>
        <input type="file" id="ldinp" accept=".animscript,.json" style="display:none" onchange="loadFile(this)">
      </div>
      <button class="sbbtn2" id="cred-btn" onclick="showCredits()">End Credits</button>
    </div>
  </div>
  <div class="main" id="main">
    <div class="empty">Select or create a scene</div>
  </div>
</div>

<div id="toast"></div>

<script>
const COLS=['#8b6dff','#f5a623','#2ecc8a','#ff6b9d','#4fc3f7','#ffb347','#b39ddb','#80cbc4','#ff7043','#26c6da','#d4e157','#ab47bc','#ef5350','#66bb6a','#ffa726','#29b6f6'];
let DB={activeId:null,projects:{}};
let P=null; // current project

function uid(){return '_'+Math.random().toString(36).slice(2,9)}
function xe(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function xh(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function mkProj(t){return{id:uid(),title:t||'Untitled Project',va:'',thumbnail:'',scenes:[],roster:[],credits:{vas:'',discord:'',comments:'',description:''},active:null,credOpen:false,updatedAt:Date.now()}}

function persist(){
  if(P&&DB.activeId){P.updatedAt=Date.now();DB.projects[DB.activeId]=JSON.parse(JSON.stringify(P));}
  try{localStorage.setItem('ss',JSON.stringify(DB))}catch(e){}
}

function boot(){
  try{
    const raw=localStorage.getItem('ss')||localStorage.getItem('animscript_db')||localStorage.getItem('ss_db');
    if(raw){DB=JSON.parse(raw);}
    const old=localStorage.getItem('animscript5');
    if(!Object.keys(DB.projects||{}).length&&old){
      const p=JSON.parse(old);p.id=p.id||uid();p.updatedAt=Date.now();
      DB={activeId:p.id,projects:{[p.id]:p}};
    }
    if(!DB.projects)DB.projects={};
    if(!Object.keys(DB.projects).length){const p=mkProj('My First Project');DB.projects[p.id]=p;DB.activeId=p.id;}
    if(!DB.activeId||!DB.projects[DB.activeId])DB.activeId=Object.keys(DB.projects)[0];
    P=DB.projects[DB.activeId];
    persist();
  }catch(e){const p=mkProj('My First Project');DB={activeId:p.id,projects:{[p.id]:p}};P=p;persist();}
}

function show(id){

  document.getElementById('editor').classList.remove('show');
  document.getElementById(id).classList.add('show');
}
function goHome(){persist();renderHome();show('home');}

/* HOME */
function renderHome(){
  const all=Object.values(DB.projects).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  document.getElementById('proj-count-lbl').textContent=all.length+' project'+(all.length!==1?'s':'');
  const grid=document.getElementById('proj-grid');
  grid.innerHTML='';
  if(!all.length){grid.innerHTML='<div style="color:var(--txt3);font-size:13px">No projects yet.</div>';return;}
  all.forEach(p=>{
    const scenes=p.scenes||[];
    const date=p.updatedAt?new Date(p.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}):'';
    const chips=scenes.slice(0,3).map(s=>'<span class="chip">'+xe(s.title||'Scene')+'</span>').join('');
    const more=scenes.length>3?'<span class="chip">+'+(scenes.length-3)+'</span>':'';

    const card=document.createElement('div');
    card.className='pcard';

    const btns=document.createElement('div');
    btns.className='pcard-btns';

    const renBtn=document.createElement('button');
    renBtn.className='pcbtn';renBtn.textContent='✎';renBtn.title='Rename';
    renBtn.addEventListener('click',function(e){e.stopPropagation();renameProjById(p.id);});

    const saveBtn=document.createElement('button');
    saveBtn.className='pcbtn';saveBtn.textContent='↓';saveBtn.title='Save file';
    saveBtn.addEventListener('click',function(e){e.stopPropagation();exportProjById(p.id);});

    const delBtn=document.createElement('button');
    delBtn.className='pcbtn red';delBtn.textContent='✕';delBtn.title='Delete';
    delBtn.addEventListener('click',function(e){e.stopPropagation();deleteProjById(p.id);});

    btns.appendChild(renBtn);btns.appendChild(saveBtn);btns.appendChild(delBtn);

    card.innerHTML=
      '<div class="pcard-emoji">🎬</div>'+
      '<div class="pcard-title">'+xe(p.title||'Untitled Project')+'</div>'+
      '<div class="pcard-meta">'+scenes.length+' scene'+(scenes.length!==1?'s':'')+' '+(date?'· '+date:'')+'</div>'+
      '<div class="pcard-chips">'+chips+more+(!scenes.length?'<span style="font-size:11px;color:var(--txt3)">No scenes yet</span>':'')+'</div>';

    card.appendChild(btns);
    card.addEventListener('click',function(){openProj(p.id);});
    grid.appendChild(card);
  });
}

function openProj(id){
  persist();
  DB.activeId=id;
  P=DB.projects[id];
  persist();
  renderEditor();
  show('editor');
}

function createProj(){
  const t=prompt('Project name:','Untitled Project');
  if(t===null)return;
  const p=mkProj(t||'Untitled Project');
  DB.projects[p.id]=p;
  openProj(p.id);
}

function renameCurProj(){
  const v=prompt('Rename project:',P.title||'Untitled Project');
  if(v===null)return;
  P.title=v||'Untitled Project';persist();
  document.getElementById('pname').textContent=P.title;
}

function renameProjById(id){
  const p=DB.projects[id];if(!p)return;
  const v=prompt('Rename project:',p.title||'Untitled Project');
  if(v===null)return;
  p.title=v||'Untitled Project';
  if(id===DB.activeId&&P)P.title=p.title;
  persist();renderHome();
}

function exportProjById(id){
  const p=DB.projects[id]||P;
  const nm=(p.title||'Project').replace(/[^a-z0-9_\-\s]/gi,'_').trim()+'.animscript';
  const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=nm;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Saved: '+nm);
}

function deleteProjById(id){
  const p=DB.projects[id];
  if(!confirm('Delete "'+p.title+'"? Cannot be undone.'))return;
  delete DB.projects[id];
  if(DB.activeId===id){
    const rem=Object.keys(DB.projects);
    if(rem.length){DB.activeId=rem[0];P=DB.projects[DB.activeId];}
    else{const np=mkProj('My First Project');DB.projects[np.id]=np;DB.activeId=np.id;P=np;}
  }
  persist();renderHome();
}

function saveFile(){exportProjById(DB.activeId);}
function loadFile(inp){importProj(inp);}
function importProj(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(!p.scenes)throw 0;
      if(!p.id||DB.projects[p.id])p.id=uid();
      p.updatedAt=Date.now();DB.projects[p.id]=p;persist();
      renderHome();toast('Imported: '+p.title);
    }catch(e){alert("Couldn't import — make sure it's a valid .animscript file.");}
    inp.value='';
  };
  r.readAsText(file);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500);
}

function delChar(id){

function setCharNotes(id,v){const c=P.roster.find(c=>c.id===id);if(c){c.notes=v;persist();}}
function setCharColor(id,col){
  const c=P.roster.find(c=>c.id===id);if(!c)return;c.color=col;persist();
  const card=document.querySelector('.ccard[data-rid="'+id+'"]');

function renderRoster(){
  const el=document.getElementById('roster-body');if(!el)return;

    const init=(c.name||'?').slice(0,2).toUpperCase();
    const sws=COLS.map(col=>'<button class="sw" data-c="'+col+'" onclick="setCharColor(\''+c.id+'\',\''+col+'\')" style="background:'+col+';outline:'+(col===c.color?'2px solid #fff':'none')+';outline-offset:1px"></button>').join('');
    return '<div class="ccard" data-rid="'+c.id+'">'+
      '<div class="ccard-top">'+
        '<div class="cav" style="background:'+c.color+'22;color:'+c.color+'">'+init+'</div>'+
        '<input class="cname" type="text" placeholder="Name..." value="'+xe(c.name)+'" oninput="setCharName(\''+c.id+'\',this.value)">'+
        '<button class="cdel" onclick="delChar(\''+c.id+'\')">✕</button>'+

      '<div class="cswatches">'+sws+'</div>'+

/* SCENES */
function addScene(){
  const sc={id:uid(),title:'Scene '+(P.scenes.length+1),notes:'',blocks:[]};
  P.scenes.push(sc);P.active=sc.id;P.credOpen=false;
  persist();renderEditor();
}
function setActiveScene(id){P.active=id;P.credOpen=false;persist();renderEditor();}

function delScene(id){
  if(!confirm('Delete this scene?'))return;
  P.scenes=P.scenes.filter(s=>s.id!==id);
  if(P.active===id)P.active=P.scenes.length?P.scenes[P.scenes.length-1].id:null;

function navScene(d){
  const i=P.scenes.findIndex(s=>s.id===P.active);

}
function setSceneTitle(id,v){

}
function setSceneNotes(id,v){const sc=P.scenes.find(s=>s.id===id);if(sc){sc.notes=v;persist();}}

/* BLOCKS */
function getBlk(sid,bid){const sc=P.scenes.find(s=>s.id===sid);return sc&&sc.blocks.find(b=>b.id===bid);}
function addBlock(sid,type){
  const sc=P.scenes.find(s=>s.id===sid);if(!sc)return;
  const b={id:uid(),type,title:''};
  if(type==='narrator')b.rows=[{id:uid(),narration:'',visuals:'',sfx:'',timing:''}];
  if(type==='scenario'){b.rows=[{id:uid(),rosterId:'',name:'',dialogue:'',visuals:'',environment:'',sfx:''}];b.timing='';}
  sc.blocks.push(b);persist();renderMain();
}
function delBlock(sid,bid){const sc=P.scenes.find(s=>s.id===sid);if(sc)sc.blocks=sc.blocks.filter(b=>b.id!==bid);persist();renderMain();}
function setBlockTitle(sid,bid,v){const b=getBlk(sid,bid);if(b){b.title=v;persist();}}

function addNRow(sid,bid){const b=getBlk(sid,bid);if(b){b.rows.push({id:uid(),narration:'',visuals:'',sfx:'',timing:''});persist();renderMain();}}
function delNRow(sid,bid,rid){const b=getBlk(sid,bid);if(b&&b.rows.length>1){b.rows=b.rows.filter(r=>r.id!==rid);persist();renderMain();}}
function setNR(sid,bid,rid,f,v){const b=getBlk(sid,bid);const r=b&&b.rows.find(r=>r.id===rid);if(r){r[f]=v;persist();}}

function addSRow(sid,bid,rid){
  const b=getBlk(sid,bid);const rc=rid?P.roster.find(r=>r.id===rid):null;
  if(b)b.rows.push({id:uid(),rosterId:rc?rc.id:'',name:rc?rc.name:'',dialogue:'',visuals:'',environment:'',sfx:''});
  persist();renderMain();
}
function delSRow(sid,bid,rid){const b=getBlk(sid,bid);if(b&&b.rows.length>1){b.rows=b.rows.filter(r=>r.id!==rid);persist();renderMain();}}
function setSR(sid,bid,rid,f,v){const b=getBlk(sid,bid);const r=b&&b.rows.find(r=>r.id===rid);if(r){r[f]=v;persist();}}
function setBlkF(sid,bid,f,v){const b=getBlk(sid,bid);if(b){b[f]=v;persist();}}
function setCredF(f,v){P.credits[f]=v;persist();}

/* AUTO EXPAND */
function ae(){
  document.querySelectorAll('textarea.auto,textarea.note-ta,textarea.cnotes').forEach(function(t){
    t.style.height='auto';
    t.style.height=(t.scrollHeight)+'px';
    if(!t._ae){
      t._ae=true;
      t.addEventListener('input',function(){
        this.style.height='auto';
        this.style.height=(this.scrollHeight)+'px';
      });
    }
  });
}

/* TAB SWITCH */
function switchTab(tab,btn){
  document.querySelectorAll('.sb-tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.sb-panel').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('panel-'+tab).classList.add('on');
}

function renderMain(){
  const main=document.getElementById('main');if(!main)return;
  if(P.credOpen){renderCredits(main);return;}
  const sc=P.scenes.find(s=>s.id===P.active);
  if(!sc){main.innerHTML='<div class="empty"><div style="font-size:32px;opacity:0.15">✦</div><div>Select a scene or create one</div></div>';return;}

  h+='<div class="topbar">'+
    '<input class="stitle" type="text" value="'+xe(sc.title)+'" placeholder="Scene title..." oninput="setSceneTitle(\''+sc.id+'\',this.value)">'+

      (idx>0?'<button class="navbtn" onclick="navScene(-1)">← Prev</button>':'')+
      (idx<P.scenes.length-1?'<button class="navbtn" onclick="navScene(1)">Next →</button>':'')+
      '<button class="pdfbtn" onclick="exportPDF()">Export PDF</button>'+
      '<button class="delbtn" onclick="delScene(\''+sc.id+'\')">Delete</button>'+
    '</div>'+
  '</div>';

  h+='<div class="block ntb">'+
    '<div class="bh"><div class="bh-left"><span class="blbl">📝 Scene Notes</span></div></div>'+

  '</div>';

    // migrate old format
    if(b.type==='scenario'&&!b.rows&&b.chars){
      b.rows=b.chars.map(c=>({id:c.id,rosterId:c.rosterId||'',name:c.name||'',dialogue:c.dialogue||'',visuals:b.visuals||'',environment:b.environment||'',sfx:b.sfx||''}));

      const rows=b.rows.map(r=>
        '<div class="row-wrap" style="grid-template-columns:38% 26% 18% 18%">'+
          '<div class="rcell"><textarea class="auto" placeholder="Your narration..." oninput="setNR(\''+sc.id+'\',\''+b.id+'\',\''+r.id+'\',\'narration\',this.value)">'+xe(r.narration)+'</textarea></div>'+
          '<div class="rcell"><textarea class="auto" placeholder="What to draw..." oninput="setNR(\''+sc.id+'\',\''+b.id+'\',\''+r.id+'\',\'visuals\',this.value)">'+xe(r.visuals)+'</textarea></div>'+
          '<div class="rcell"><textarea class="auto" placeholder="SFX / music..." oninput="setNR(\''+sc.id+'\',\''+b.id+'\',\''+r.id+'\',\'sfx\',this.value)">'+xe(r.sfx)+'</textarea></div>'+
          '<div class="rcell" style="position:relative"><textarea class="auto" placeholder="Timing..." oninput="setNR(\''+sc.id+'\',\''+b.id+'\',\''+r.id+'\',\'timing\',this.value)">'+xe(r.timing)+'</textarea>'+
            (b.rows.length>1?'<button class="rdel" onclick="delNRow(\''+sc.id+'\',\''+b.id+'\',\''+r.id+'\')">✕</button>':'')+
          '</div>'+

        '<div class="bh"><div class="bh-left"><span class="blbl">◆ Narrator — What You Say</span>'+
          '<input class="btitle-inp" type="text" value="'+xe(b.title||'')+'" placeholder="Block title (optional)..." oninput="setBlockTitle(\''+sc.id+'\',\''+b.id+'\',this.value)">'+
        '</div><button class="bdel" onclick="delBlock(\''+sc.id+'\',\''+b.id+'\')">✕</button></div>'+

      h+='<div class="block sb">'+

          '<input class="btitle-inp" type="text" value="'+xe(b.title||'')+'" placeholder="Block title (optional)..." oninput="setBlockTitle(\''+sc.id+'\',\''+b.id+'\',this.value)">'+

      '</div>';
    }
  });

  h+='<div class="add-area"><div class="add-lbl">Add block</div><div class="add-btns">'+
    '<button class="ab abn" onclick="addBlock(\''+sc.id+'\',\'narrator\')">+ Narrator Block</button>'+
    '<button class="ab abs" onclick="addBlock(\''+sc.id+'\',\'scenario\')">+ Scenario Block</button>'+

  main.innerHTML=h;

      '</div></div>';
}

function exportPDF(){
  const sc=P.scenes.find(s=>s.id===P.active);
  const tp=P.credOpen?P.scenes:(sc?[sc]:P.scenes);
  let h='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>@page{size:landscape;margin:15mm 12mm}body{font-family:Arial,sans-serif;color:#000;font-size:12px}h1{font-size:20px;margin-bottom:4px}.meta{font-size:11px;color:#555;margin-bottom:20px}.sh{font-size:14px;font-weight:bold;margin:18px 0 6px;border-bottom:2px solid #000;padding-bottom:3px}.bw{margin-bottom:14px;border:1px solid #999;page-break-inside:avoid}.blbl{background:#f0f0f0;padding:5px 10px;font-size:9px;font-weight:bold;letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid #aaa}table{width:100%;border-collapse:collapse;table-layout:fixed}th{background:#f5f5f5;padding:5px 8px;font-size:9px;font-weight:bold;border:1px solid #aaa;text-align:left;text-transform:uppercase}td{border:1px solid #bbb;padding:8px 10px;vertical-align:top;font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-word}.cn{font-weight:bold;font-size:10px;color:#444;margin-bottom:3px;font-family:monospace}.notebox{background:#f8f9ff;border:1px dashed #aaa;padding:8px 12px;font-size:11px;color:#444;margin-bottom:10px;white-space:pre-wrap}.tbar{display:flex;border-top:1px solid #bbb;font-size:10px}.tbar .l{padding:5px 10px;background:#f5f5f5;border-right:1px solid #bbb;font-weight:bold;text-transform:uppercase;font-size:9px}.tbar .v{padding:5px 10px}</style></head><body>';
  h+='<h1>'+xh(P.title||'Untitled')+'</h1><div class="meta">'+(P.va?'VA: '+xh(P.va)+' | ':'')+P.scenes.length+' scenes</div>';
  tp.forEach(scene=>{
    h+='<div class="sh">'+xh(scene.title||'Untitled Scene')+'</div>';
    if(scene.notes)h+='<div class="notebox">📝 '+xh(scene.notes)+'</div>';
    scene.blocks.forEach(b=>{
      const blbl=(b.title?xh(b.title)+' — ':'');
      if(b.type==='narrator'){
        h+='<div class="bw"><div class="blbl">'+blbl+'◆ Narrator</div><table><thead><tr><th style="width:40%">What you say</th><th style="width:26%">Visuals</th><th style="width:18%">SFX</th><th style="width:16%">Timing</th></tr></thead><tbody>';
        b.rows.forEach(r=>{h+='<tr><td>'+xh(r.narration)+'</td><td>'+xh(r.visuals)+'</td><td>'+xh(r.sfx)+'</td><td>'+xh(r.timing)+'</td></tr>';});
        h+='</tbody></table></div>';
      }else if(b.type==='scenario'){
        const rows=b.rows||(b.chars?b.chars.map(c=>({...c,visuals:b.visuals||'',environment:b.environment||'',sfx:b.sfx||''})):[]);
        h+='<div class="bw"><div class="blbl">'+blbl+'● Scenario</div><table><thead><tr><th style="width:28%">Character / Dialogue</th><th style="width:24%">Visuals</th><th style="width:24%">Environment</th><th style="width:16%">SFX</th></tr></thead><tbody>';
        rows.forEach(r=>{
          const rc=P.roster.find(x=>x.id===r.rosterId);
          const dot=rc?'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+rc.color+';margin-right:5px;vertical-align:middle"></span>':'';
          h+='<tr><td><div class="cn">'+dot+xh(r.name||'???')+'</div>'+xh(r.dialogue)+'</td><td>'+xh(r.visuals)+'</td><td>'+xh(r.environment)+'</td><td>'+xh(r.sfx)+'</td></tr>';
        });
        h+='</tbody></table>'+(b.timing?'<div class="tbar"><div class="l">Timing</div><div class="v">'+xh(b.timing)+'</div></div>':'')+'</div>';
      }
    });
  });
  h+='</body></html>';
  const w=window.open('','_blank');w.document.write(h);w.document.close();setTimeout(()=>w.print(),400);
}

boot();
renderHome();
show('home');
