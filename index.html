<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Script Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e10;--surface:#18181c;--surface2:#222228;--surface3:#2a2a32;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f2;--text2:#9090a0;--text3:#55556a;
  --n-bg:#1a1428;--n-border:#4a3a8a;--n-accent:#8b6dff;--n-label:#c4aaff;
  --s-bg:#1a1208;--s-border:#7a5a10;--s-accent:#f5a623;--s-label:#ffd080;
  --c-bg:#0d1a14;--c-border:#1a5a3a;--c-label:#7fffc4;
  --note-bg:#111820;--note-border:#1a3a5a;--note-label:#7fb8ff;
  --red:#ff4d4d;--r:10px;--rlg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}

/* SIDEBAR */
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-top{padding:18px 14px 12px;border-bottom:1px solid var(--border)}
.proj-btn{font-size:14px;font-weight:700;font-family:'Syne',sans-serif;background:none;border:none;color:var(--text);cursor:pointer;text-align:left;width:100%;display:flex;align-items:center;gap:5px}
.proj-btn:hover{color:var(--n-accent)}
.proj-count{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px}
.sb-tabs{display:flex;border-bottom:1px solid var(--border)}
.sb-tab{flex:1;padding:8px 6px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.sb-tab:hover{color:var(--text2)}
.sb-tab.active{color:var(--n-label);border-bottom-color:var(--n-accent)}
.sb-panel{display:none;flex:1;overflow-y:auto;flex-direction:column}
.sb-panel.active{display:flex}
.sb-panel::-webkit-scrollbar{width:3px}
.sb-panel::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
.scene-list{padding:8px 6px;display:flex;flex-direction:column;gap:2px}
.si{padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:7px;font-weight:500;transition:background 0.1s}
.si:hover{background:var(--surface2);color:var(--text)}
.si.active{background:var(--surface3);color:var(--text)}
.si-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);min-width:18px}
.si-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Roster */
.roster-body{padding:10px 8px;display:flex;flex-direction:column;gap:6px;flex:1}
.char-card{background:var(--surface2);border-radius:var(--r);border:1px solid var(--border2);overflow:hidden}
.char-card-top{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border)}
.char-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0}
.char-card-name{flex:1;background:transparent;border:none;font-size:12px;font-weight:700;color:var(--text);font-family:'Syne',sans-serif;outline:none}
.char-card-name::placeholder{color:var(--text3)}
.btn-char-del-r{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 4px}
.btn-char-del-r:hover{color:var(--red)}
.char-card-notes{width:100%;background:transparent;border:none;padding:7px 10px;font-size:11px;color:var(--text2);font-family:'Syne',sans-serif;resize:none;min-height:44px;line-height:1.5;overflow:hidden}
.char-card-notes:focus{outline:none}
.char-card-notes::placeholder{color:var(--text3)}
.btn-add-char-r{margin:4px 8px 8px;padding:8px;background:transparent;border:1px dashed var(--border2);border-radius:var(--r);color:var(--text3);font-size:11px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s}
.btn-add-char-r:hover{border-color:var(--s-accent);color:var(--s-label);background:rgba(245,166,35,0.05)}

.sb-bot{padding:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.btn-new{padding:9px;background:transparent;border:1px dashed var(--border2);border-radius:var(--r);color:var(--text2);font-size:12px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s}
.btn-new:hover{border-color:var(--n-accent);color:var(--n-accent);background:rgba(139,109,255,0.06)}
.btn-credits{padding:8px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--text3);font-size:12px;font-family:'Syne',sans-serif;cursor:pointer;text-align:center;transition:all 0.15s}
.btn-credits:hover,.btn-credits.active{border-color:var(--c-border);color:var(--c-label);background:var(--c-bg)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:14px}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
.topbar{display:flex;align-items:center;gap:10px}
.scene-title{flex:1;font-size:20px;font-weight:700;background:transparent;border:none;color:var(--text);font-family:'Syne',sans-serif;outline:none}
.scene-title::placeholder{color:var(--text3)}
.nav-grp{display:flex;gap:6px}
.btn-nav{padding:6px 13px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:11px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-nav:hover{background:var(--surface2);color:var(--text)}
.btn-del{padding:6px 10px;background:transparent;border:1px solid transparent;border-radius:var(--r);color:var(--text3);font-size:11px;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.15s}
.btn-del:hover{border-color:var(--red);color:var(--red)}
.btn-pdf{padding:6px 13px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:11px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-pdf:hover{background:var(--c-bg);border-color:var(--c-border);color:var(--c-label)}

/* BLOCKS */
.block{border-radius:var(--rlg);border:1px solid var(--border);overflow:visible}
.block.nb{border-color:var(--n-border);background:var(--n-bg)}
.block.sb-block{border-color:var(--s-border);background:var(--s-bg)}
.block.cb{border-color:var(--c-border);background:var(--c-bg)}
.block.note-block{border-color:var(--note-border);background:var(--note-bg)}

.bh{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);border-radius:var(--rlg) var(--rlg) 0 0}
.nb .bh{border-bottom-color:var(--n-border)}
.sb-block .bh{border-bottom-color:var(--s-border)}
.cb .bh{border-bottom-color:var(--c-border)}
.note-block .bh{border-bottom-color:var(--note-border)}

.bl{font-size:10px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;font-family:'DM Mono',monospace}
.nb .bl{color:var(--n-label)}
.sb-block .bl{color:var(--s-label)}
.cb .bl{color:var(--c-label)}
.note-block .bl{color:var(--note-label)}
.btn-bdel{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:5px}
.btn-bdel:hover{color:var(--red)}

/* AUTO-EXPAND TEXTAREA — key fix */
textarea.auto{
  width:100%;
  background:transparent;
  border:none;
  padding:10px 12px;
  font-size:13px;
  color:var(--text);
  font-family:'Syne',sans-serif;
  line-height:1.65;
  resize:none;
  overflow:hidden;
  min-height:44px;
  height:44px;
  display:block;
}
textarea.auto:focus{outline:none;background:rgba(255,255,255,0.015)}
textarea.auto::placeholder{color:var(--text3)}

/* TABLE layout */
.block-table{width:100%;border-collapse:collapse;table-layout:fixed;border-radius:0 0 var(--rlg) var(--rlg);overflow:hidden}
.block-table th{padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;color:var(--text3);border-bottom:1px solid var(--border);border-right:1px solid var(--border);background:rgba(0,0,0,0.2);text-align:left}
.block-table th:last-child{border-right:none}
.block-table td{padding:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:top}
.block-table td:last-child{border-right:none}
.block-table tr:last-child td{border-bottom:none}

/* Narrator row controls */
.narr-row-wrap{position:relative}
.narr-row-wrap:not(:last-child){border-bottom:1px solid var(--border)}
.btn-del-row{position:absolute;top:6px;right:6px;background:transparent;border:none;color:var(--text3);font-size:10px;cursor:pointer;padding:2px 5px;border-radius:4px;opacity:0;transition:opacity 0.15s}
.narr-row-wrap:hover .btn-del-row{opacity:1}
.btn-del-row:hover{color:var(--red);opacity:1}
.add-row-bar{padding:6px 12px;border-top:1px solid var(--border);background:rgba(0,0,0,0.1)}
.btn-add-row{background:transparent;border:none;color:var(--text3);font-size:11px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;padding:2px 6px;border-radius:5px;transition:all 0.15s}
.nb .btn-add-row:hover{color:var(--n-label)}

/* Scenario char picker */
.char-picker-bar{padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.15);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.char-picker-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;margin-right:4px;white-space:nowrap}
.char-pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid transparent;transition:all 0.15s;background:rgba(255,255,255,0.05);color:var(--text2)}
.char-pill:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.char-pill.active-char{color:#fff;border-color:transparent}
.char-pill-empty{font-size:11px;color:var(--text3);font-style:italic}

/* Scenario char lines */
.char-line-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border)}
.char-line-row:last-child{border-bottom:none}
.char-name-badge{width:110px;min-width:110px;padding:10px 12px;display:flex;align-items:flex-start;gap:6px;border-right:1px solid var(--border);background:rgba(0,0,0,0.1)}
.char-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.char-name-text{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;color:var(--s-label);line-height:1.4;word-break:break-word}
.char-dia-cell{flex:1;position:relative}
.btn-char-line-del{position:absolute;top:6px;right:6px;background:transparent;border:none;color:var(--text3);font-size:10px;cursor:pointer;padding:2px 5px;border-radius:4px;opacity:0;transition:opacity 0.15s}
.char-line-row:hover .btn-char-line-del{opacity:1}
.btn-char-line-del:hover{color:var(--red);opacity:1}

.add-char-line-bar{padding:6px 12px;border-top:1px solid var(--border);background:rgba(0,0,0,0.1)}
.btn-add-char-line{background:transparent;border:none;color:var(--text3);font-size:11px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;padding:2px 6px;border-radius:5px;transition:all 0.15s}
.btn-add-char-line:hover{color:var(--s-label)}

/* Scenario side cols */
.scenario-cols{display:flex;border-top:1px solid var(--border)}
.scenario-col{flex:1;border-right:1px solid var(--border)}
.scenario-col:last-child{border-right:none}
.scenario-col-label{padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;color:var(--text3);border-bottom:1px solid var(--border);background:rgba(0,0,0,0.15)}

/* Timing */
.timing-row{display:flex;align-items:center;border-top:1px solid var(--border)}
.timing-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);padding:9px 12px;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;border-right:1px solid var(--border)}
.timing-inp{flex:1;background:transparent;border:none;padding:9px 12px;font-size:13px;color:var(--text);font-family:'Syne',sans-serif}
.timing-inp:focus{outline:none}
.timing-inp::placeholder{color:var(--text3)}

/* scene notes */
.note-textarea{width:100%;background:transparent;border:none;padding:12px 14px;font-size:13px;color:var(--text2);font-family:'Syne',sans-serif;resize:none;overflow:hidden;min-height:44px;height:44px;line-height:1.6;display:block}
.note-textarea:focus{outline:none;color:var(--text)}
.note-textarea::placeholder{color:var(--text3)}

/* add block area */
.add-area{padding:4px 0 8px}
.add-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:9px}
.add-btns{display:flex;gap:8px}
.btn-ab{padding:8px 16px;border-radius:var(--r);font-size:12px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s}
.btn-ab-n{background:var(--n-bg);border-color:var(--n-border);color:var(--n-label)}
.btn-ab-n:hover{background:rgba(139,109,255,0.2);border-color:var(--n-accent)}
.btn-ab-s{background:var(--s-bg);border-color:var(--s-border);color:var(--s-label)}
.btn-ab-s:hover{background:rgba(245,166,35,0.2);border-color:var(--s-accent)}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:13px;text-align:center;padding:48px}

/* credits */
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
.cred-field{display:flex;flex-direction:column;gap:5px}
.cred-label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace}
.cred-grid textarea,.cred-grid input[type=text]{background:rgba(0,0,0,0.3);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--text);font-family:'Syne',sans-serif;width:100%}
.cred-grid textarea{resize:vertical;min-height:70px}
.cred-grid input[type=text]{height:38px}
.cred-grid textarea:focus,.cred-grid input:focus{outline:none;border-color:var(--c-border)}
.cred-grid textarea::placeholder,.cred-grid input::placeholder{color:var(--text3)}

@media print {
  @page{size:landscape;margin:15mm 12mm}
  body{background:#fff!important;color:#000!important;display:block;height:auto;overflow:visible;font-family:Arial,sans-serif}
  .sidebar,.sb-top,.sb-tabs,.sb-bot,.topbar,.add-area,.btn-bdel,.btn-add-row,.btn-del-row,.add-row-bar,.add-char-line-bar,.char-picker-bar,.btn-char-line-del{display:none!important}
  .main{display:block!important;padding:0;overflow:visible}
  .block{border:1px solid #999!important;background:#fff!important;border-radius:0!important;margin-bottom:12px;page-break-inside:avoid;overflow:visible!important}
  .bh{background:#f0f0f0!important;padding:6px 10px!important;border-bottom:1px solid #999!important;border-radius:0!important}
  .bl{color:#000!important;font-size:9px!important}
  textarea.auto,.note-textarea{color:#000!important;font-size:11px!important;overflow:visible!important;height:auto!important;min-height:0!important}
  .char-name-badge{background:#f5f5f5!important;border-right:1px solid #bbb!important}
  .char-name-text{color:#333!important}
  .scenario-col-label{color:#555!important;background:#f5f5f5!important;border-bottom:1px solid #bbb!important}
  .timing-label{color:#555!important}
  .timing-inp{color:#000!important}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-top">
    <button class="proj-btn" id="proj-btn" onclick="editTitle()">Untitled Project <span style="font-size:11px;color:var(--text3)">✎</span></button>
    <div class="proj-count" id="proj-count">0 scenes</div>
  </div>
  <div class="sb-tabs">
    <button class="sb-tab active" onclick="switchTab('scenes',this)">Scenes</button>
    <button class="sb-tab" onclick="switchTab('roster',this)">Characters</button>
  </div>
  <div class="sb-panel active" id="panel-scenes">
    <div class="scene-list" id="scene-list"></div>
  </div>
  <div class="sb-panel" id="panel-roster">
    <div class="roster-body" id="roster-body"></div>
    <button class="btn-add-char-r" onclick="addRosterChar()">+ Add Character</button>
  </div>
  <div class="sb-bot">
    <button class="btn-new" onclick="addScene()">+ New Scene</button>
    <button class="btn-credits" id="cred-btn" onclick="showCredits()">End Credits</button>
  </div>
</div>

<div class="main" id="main"></div>

<script>
const COLORS=['#8b6dff','#f5a623','#2ecc8a','#ff6b9d','#4fc3f7','#ffb347','#b39ddb','#80cbc4','#ff7043','#26c6da','#d4e157','#ab47bc','#ef5350','#66bb6a','#ffa726','#29b6f6'];

let S={
  title:'Untitled Project',va:'',thumbnail:'',
  scenes:[],roster:[],
  credits:{vas:'',discord:'',comments:'',description:''},
  active:null,credOpen:false
};

function uid(){return '_'+Math.random().toString(36).slice(2,9)}
function save(){try{localStorage.setItem('animscript5',JSON.stringify(S))}catch(e){}}
function load(){try{const s=localStorage.getItem('animscript5');if(s)S=JSON.parse(s)}catch(e){}}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escH(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* Auto-expand all textareas */
function autoExpand(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}
function initAutoExpand(){
  document.querySelectorAll('textarea.auto, textarea.note-textarea, textarea.char-card-notes').forEach(t=>{
    autoExpand(t);
    t.addEventListener('input',()=>autoExpand(t));
  });
}

function switchTab(tab,btn){
  document.querySelectorAll('.sb-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.sb-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

function editTitle(){
  const v=prompt('Project title:',S.title);
  if(v!==null){S.title=v||'Untitled Project';save();renderSB()}
}

/* ROSTER */
function addRosterChar(){
  S.roster.push({id:uid(),name:'',notes:'',color:COLORS[S.roster.length%COLORS.length]});
  save();renderRoster();renderMain();
}
function delRosterChar(id){
  S.roster=S.roster.filter(c=>c.id!==id);save();renderRoster();renderMain();
}
function setRosterField(id,f,v){
  const c=S.roster.find(c=>c.id===id);
  if(!c)return;
  c[f]=v;
  save();
  if(f==='name'){
    // Update avatar initials in place without full re-render
    const card=document.querySelector(`.char-card[data-rid="${id}"]`);
    if(card){
      const av=card.querySelector('.char-avatar');
      if(av)av.textContent=(v||'?').slice(0,2).toUpperCase();
    }
    // Re-render main to update pills — but only after typing stops (debounced)
    clearTimeout(window._rosterDebounce);
    window._rosterDebounce=setTimeout(()=>renderMain(),600);
  }
}
function getRoster(){return S.roster.filter(c=>c.name)}

function setCharColor(id,color){
  const c=S.roster.find(c=>c.id===id);
  if(!c)return;
  c.color=color;
  save();
  // Update avatar in place
  const card=document.querySelector(`.char-card[data-rid="${id}"]`);
  if(card){
    const av=card.querySelector('.char-avatar');
    if(av){av.style.background=color+'22';av.style.color=color;}
    // Update swatch active state
    card.querySelectorAll('.color-swatch').forEach(sw=>{
      sw.style.outline=sw.dataset.col===color?'2px solid #fff':'none';
      sw.style.outlineOffset='1px';
    });
  }
  // Update pills + dots in main without full re-render
  clearTimeout(window._colorDebounce);
  window._colorDebounce=setTimeout(()=>renderMain(),100);
}

function renderRoster(){
  const el=document.getElementById('roster-body');
  if(!S.roster.length){el.innerHTML='<div style="padding:16px;font-size:12px;color:var(--text3);text-align:center">No characters yet.<br>Add your recurring cast.</div>';return}
  el.innerHTML=S.roster.map(c=>{
    const initials=(c.name||'?').slice(0,2).toUpperCase();
    const swatches=COLORS.map(col=>{
      const isActive=col===c.color;
      return `<div class="color-swatch" data-col="${col}" onclick="setCharColor('${c.id}','${col}')"
        style="width:14px;height:14px;border-radius:50%;background:${col};cursor:pointer;flex-shrink:0;
        outline:${isActive?'2px solid #fff':'none'};outline-offset:1px;transition:transform 0.1s"
        onmouseover="this.style.transform='scale(1.25)'" onmouseout="this.style.transform='scale(1)'"></div>`;
    }).join('');
    return `<div class="char-card" data-rid="${c.id}">
      <div class="char-card-top">
        <div class="char-avatar" style="background:${c.color}22;color:${c.color};cursor:default">${initials}</div>
        <input class="char-card-name" type="text" placeholder="Name..." value="${esc(c.name)}"
          oninput="setRosterField('${c.id}','name',this.value)">
        <button class="btn-char-del-r" onclick="delRosterChar('${c.id}')">✕</button>
      </div>
      <div style="padding:6px 10px 8px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border)">
        ${swatches}
      </div>
      <textarea class="char-card-notes auto" placeholder="Voice, personality, notes..." oninput="setRosterField('${c.id}','notes',this.value)">${esc(c.notes)}</textarea>
    </div>`;
  }).join('');
  initAutoExpand();
}

/* SCENES */
function addScene(){
  const sc={id:uid(),title:'Scene '+(S.scenes.length+1),notes:'',blocks:[]};
  S.scenes.push(sc);S.active=sc.id;S.credOpen=false;
  save();renderSB();renderMain();
}
function setActive(id){S.active=id;S.credOpen=false;save();renderSB();renderMain()}
function showCredits(){S.credOpen=true;S.active=null;renderSB();renderMain()}
function delScene(id){
  if(!confirm('Delete this scene?'))return;
  S.scenes=S.scenes.filter(s=>s.id!==id);
  if(S.active===id)S.active=S.scenes.length?S.scenes[S.scenes.length-1].id:null;
  save();renderSB();renderMain();
}
function navScene(dir){
  const i=S.scenes.findIndex(s=>s.id===S.active);
  const n=S.scenes[i+dir];
  if(n){S.active=n.id;renderSB();renderMain()}
}

/* BLOCKS */
function addBlock(sceneId,type){
  const sc=S.scenes.find(s=>s.id===sceneId);if(!sc)return;
  const b={id:uid(),type};
  if(type==='narrator'){b.rows=[{id:uid(),narration:'',visuals:'',sfx:'',timing:''}]}
  if(type==='scenario'){b.chars=[{id:uid(),rosterId:'',name:'',dialogue:''}];b.visuals='';b.environment='';b.sfx='';b.timing=''}
  sc.blocks.push(b);save();renderMain();
}
function delBlock(sid,bid){
  const sc=S.scenes.find(s=>s.id===sid);
  if(sc)sc.blocks=sc.blocks.filter(b=>b.id!==bid);
  save();renderMain();
}

/* Narrator rows */
function addNarrRow(sid,bid){
  const sc=S.scenes.find(s=>s.id===sid);
  const bl=sc&&sc.blocks.find(b=>b.id===bid);
  if(bl){bl.rows.push({id:uid(),narration:'',visuals:'',sfx:'',timing:''});save();renderMain()}
}
function delNarrRow(sid,bid,rid){
  const sc=S.scenes.find(s=>s.id===sid);
  const bl=sc&&sc.blocks.find(b=>b.id===bid);
  if(bl&&bl.rows.length>1){bl.rows=bl.rows.filter(r=>r.id!==rid);save();renderMain()}
}
function setRowField(sid,bid,rid,f,v){
  const sc=S.scenes.find(s=>s.id===sid);
  const bl=sc&&sc.blocks.find(b=>b.id===bid);
  const r=bl&&bl.rows.find(r=>r.id===rid);
  if(r){r[f]=v;save()}
}
// direct DOM field update — no re-render needed, just save
function directSet(obj,f,v){if(obj){obj[f]=v;save()}}

/* Scenario chars */
function addCharLine(sid,bid){
  const sc=S.scenes.find(s=>s.id===sid);
  const bl=sc&&sc.blocks.find(b=>b.id===bid);
  if(bl){bl.chars.push({id:uid(),rosterId:'',name:'',dialogue:''});save();renderMain()}
}
function delCharLine(sid,bid,cid){
  const sc=S.scenes.find(s=>s.id===sid);
  const bl=sc&&sc.blocks.find(b=>b.id===bid);
  if(bl&&bl.chars.length>1){bl.chars=bl.chars.filter(c=>c.id!==cid);save();renderMain()}
}
function setBlockField(sid,bid,f,v){
  const sc=S.scenes.find(s=>s.id===sid);
  const bl=sc&&sc.blocks.find(b=>b.id===bid);
  if(bl){bl[f]=v;save()}
}
function setCharLineField(sid,bid,cid,f,v){
  const sc=S.scenes.find(s=>s.id===sid);
  const bl=sc&&sc.blocks.find(b=>b.id===bid);
  const ch=bl&&bl.chars.find(c=>c.id===cid);
  if(ch){ch[f]=v;save()}
}
function setSceneField(id,f,v){
  const sc=S.scenes.find(s=>s.id===id);
  if(!sc)return;
  sc[f]=v;
  save();
  if(f==='title'){
    const el=document.querySelector(`.si[data-id="${id}"] .si-name`);
    if(el)el.textContent=v||'Untitled Scene';
  }
}

/* Pick character from pill — assigns roster char to a char line slot */
function pickCharForLine(sid,bid,cid,rosterId){
  const sc=S.scenes.find(s=>s.id===sid);
  const bl=sc&&sc.blocks.find(b=>b.id===bid);
  const ch=bl&&bl.chars.find(c=>c.id===cid);
  const rc=S.roster.find(r=>r.id===rosterId);
  if(ch&&rc){ch.rosterId=rosterId;ch.name=rc.name;save();renderMain()}
}

/* Scenario picker — click a pill to add that character as next line */
function addCharFromPill(sid,bid,rosterId){
  const sc=S.scenes.find(s=>s.id===sid);
  const bl=sc&&sc.blocks.find(b=>b.id===bid);
  const rc=S.roster.find(r=>r.id===rosterId);
  if(!bl||!rc)return;
  bl.chars.push({id:uid(),rosterId:rc.id,name:rc.name,dialogue:''});
  save();renderMain();
  // focus the last dialogue textarea after render
  setTimeout(()=>{
    const tas=document.querySelectorAll(`[data-bid="${bid}"] .char-dia`);
    if(tas.length)tas[tas.length-1].focus();
  },50);
}

function setCredField(f,v){S.credits[f]=v;save()}

/* Export PDF */
function exportPDF(){
  const sc=S.scenes.find(s=>s.id===S.active);
  const scenesToPrint=S.credOpen?S.scenes:(sc?[sc]:S.scenes);
  let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    @page{size:landscape;margin:15mm 12mm}
    body{font-family:Arial,sans-serif;color:#000;background:#fff;font-size:12px}
    h1{font-size:20px;margin-bottom:4px}
    .meta{font-size:11px;color:#555;margin-bottom:20px}
    .sh{font-size:14px;font-weight:bold;margin:18px 0 6px;border-bottom:2px solid #000;padding-bottom:3px}
    .bw{margin-bottom:14px;border:1px solid #999;page-break-inside:avoid}
    .blabel{background:#f0f0f0;padding:5px 10px;font-size:9px;font-weight:bold;letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid #aaa}
    table{width:100%;border-collapse:collapse;table-layout:fixed}
    th{background:#f5f5f5;padding:5px 8px;font-size:9px;font-weight:bold;border:1px solid #aaa;text-align:left;letter-spacing:0.05em;text-transform:uppercase}
    td{border:1px solid #bbb;padding:8px 10px;vertical-align:top;font-size:11px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
    .cn{font-weight:bold;font-size:10px;color:#444;margin-bottom:3px;font-family:monospace}
    .tbar{display:flex;align-items:center;border-top:1px solid #bbb;font-size:10px}
    .tbar .lbl{padding:5px 10px;background:#f5f5f5;border-right:1px solid #bbb;font-weight:bold;text-transform:uppercase;letter-spacing:0.05em;color:#555;white-space:nowrap;font-size:9px}
    .tbar .val{padding:5px 10px}
    .notebox{background:#f8f9ff;border:1px dashed #aaa;padding:8px 12px;font-size:11px;color:#444;margin-bottom:10px;white-space:pre-wrap}
  </style></head><body>`;
  html+=`<h1>${escH(S.title||'Untitled Project')}</h1>`;
  html+=`<div class="meta">${S.va?'VA: '+escH(S.va)+' &nbsp;|&nbsp; ':''}${S.scenes.length} scenes</div>`;
  scenesToPrint.forEach(scene=>{
    html+=`<div class="sh">${escH(scene.title||'Untitled Scene')}</div>`;
    if(scene.notes)html+=`<div class="notebox">📝 ${escH(scene.notes)}</div>`;
    scene.blocks.forEach(b=>{
      if(b.type==='narrator'){
        html+=`<div class="bw"><div class="blabel">◆ Narrator</div><table><thead><tr><th style="width:40%">What you say</th><th style="width:26%">Visuals</th><th style="width:18%">SFX / Music</th><th style="width:16%">Timing</th></tr></thead><tbody>`;
        b.rows.forEach(r=>{html+=`<tr><td>${escH(r.narration)}</td><td>${escH(r.visuals)}</td><td>${escH(r.sfx)}</td><td>${escH(r.timing)}</td></tr>`});
        html+=`</tbody></table></div>`;
      } else if(b.type==='scenario'){
        html+=`<div class="bw"><div class="blabel">● Scenario</div><table><thead><tr><th style="width:34%">Character / Dialogue</th><th style="width:26%">Visuals</th><th style="width:22%">Environment</th><th style="width:18%">SFX / Music</th></tr></thead><tbody>`;
        b.chars.forEach((c,ci)=>{
          const rc=S.roster.find(r=>r.id===c.rosterId);
          const dot=rc?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${rc.color};margin-right:5px;vertical-align:middle"></span>`:'';
          html+=`<tr><td><div class="cn">${dot}${escH(c.name)||'???'}</div>${escH(c.dialogue)}</td>
          ${ci===0?`<td rowspan="${b.chars.length}">${escH(b.visuals)}</td><td rowspan="${b.chars.length}">${escH(b.environment)}</td><td rowspan="${b.chars.length}">${escH(b.sfx)}</td>`:''}</tr>`;
        });
        html+=`</tbody></table>`;
        if(b.timing)html+=`<div class="tbar"><div class="lbl">Timing</div><div class="val">${escH(b.timing)}</div></div>`;
        html+=`</div>`;
      }
    });
  });
  html+=`</body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();
  setTimeout(()=>w.print(),400);
}

/* RENDER */
function renderSB(){
  document.getElementById('proj-btn').innerHTML=esc(S.title||'Untitled Project')+' <span style="font-size:11px;color:var(--text3)">✎</span>';
  document.getElementById('proj-count').textContent=S.scenes.length+' scene'+(S.scenes.length!==1?'s':'');
  document.getElementById('scene-list').innerHTML=S.scenes.map((s,i)=>`
    <div class="si ${S.active===s.id&&!S.credOpen?'active':''}" data-id="${s.id}" onclick="setActive('${s.id}')">
      <span class="si-num">${String(i+1).padStart(2,'0')}</span>
      <span class="si-name">${esc(s.title||'Untitled Scene')}</span>
    </div>`).join('');
  document.getElementById('cred-btn').className='btn-credits'+(S.credOpen?' active':'');
  renderRoster();
}

function renderMain(){
  const main=document.getElementById('main');
  if(S.credOpen){renderCreds(main);return}
  const sc=S.scenes.find(s=>s.id===S.active);
  if(!sc){main.innerHTML='<div class="empty"><div style="font-size:32px;opacity:0.2">✦</div><div>No scene selected</div><div style="font-size:11px;margin-top:4px">Create a new scene or pick one from the sidebar</div></div>';return}
  const idx=S.scenes.findIndex(s=>s.id===S.active);
  const roster=getRoster();

  let html=`<div class="topbar">
    <input class="scene-title" type="text" value="${esc(sc.title)}" placeholder="Scene title..." oninput="setSceneField('${sc.id}','title',this.value)">
    <div class="nav-grp">
      ${idx>0?`<button class="btn-nav" onclick="navScene(-1)">← Prev</button>`:''}
      ${idx<S.scenes.length-1?`<button class="btn-nav" onclick="navScene(1)">Next →</button>`:''}
      <button class="btn-pdf" onclick="exportPDF()">Export PDF</button>
      <button class="btn-del" onclick="delScene('${sc.id}')">Delete</button>
    </div>
  </div>`;

  // Scene notes
  html+=`<div class="block note-block">
    <div class="bh"><span class="bl">📝 Scene Notes</span></div>
    <textarea class="note-textarea" placeholder="Rough ideas, placeholders, anything you haven't placed yet..." oninput="setSceneField('${sc.id}','notes',this.value)">${esc(sc.notes||'')}</textarea>
  </div>`;

  sc.blocks.forEach(b=>{
    if(b.type==='narrator'){
      // Each row = full-width section with 4 columns side by side, expands naturally
      const rowsHtml=b.rows.map((r,ri)=>`
        <div class="narr-row-wrap" style="display:grid;grid-template-columns:38% 26% 18% 18%;min-height:0">
          <div style="border-right:1px solid var(--border);padding:0">
            <textarea class="auto" placeholder="Your narration..." oninput="setRowField('${sc.id}','${b.id}','${r.id}','narration',this.value)">${esc(r.narration)}</textarea>
          </div>
          <div style="border-right:1px solid var(--border);padding:0">
            <textarea class="auto" placeholder="What to draw..." oninput="setRowField('${sc.id}','${b.id}','${r.id}','visuals',this.value)">${esc(r.visuals)}</textarea>
          </div>
          <div style="border-right:1px solid var(--border);padding:0">
            <textarea class="auto" placeholder="SFX / music..." oninput="setRowField('${sc.id}','${b.id}','${r.id}','sfx',this.value)">${esc(r.sfx)}</textarea>
          </div>
          <div style="padding:0;position:relative">
            <textarea class="auto" placeholder="Timing..." oninput="setRowField('${sc.id}','${b.id}','${r.id}','timing',this.value)">${esc(r.timing)}</textarea>
            ${b.rows.length>1?`<button class="btn-del-row" onclick="delNarrRow('${sc.id}','${b.id}','${r.id}')">✕ row</button>`:''}
          </div>
        </div>`).join('');

      html+=`<div class="block nb">
        <div class="bh">
          <span class="bl">◆ Narrator — What You Say</span>
          <button class="btn-bdel" onclick="delBlock('${sc.id}','${b.id}')">✕</button>
        </div>
        <div style="display:grid;grid-template-columns:38% 26% 18% 18%;background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border)">
          <div style="padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;color:var(--text3);border-right:1px solid var(--border)">What you say</div>
          <div style="padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;color:var(--text3);border-right:1px solid var(--border)">Visuals / Draw</div>
          <div style="padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;color:var(--text3);border-right:1px solid var(--border)">SFX / Music</div>
          <div style="padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;color:var(--text3)">Timing</div>
        </div>
        ${rowsHtml}
        <div class="add-row-bar nb">
          <button class="btn-add-row" onclick="addNarrRow('${sc.id}','${b.id}')">+ Add row</button>
        </div>
      </div>`;

    } else if(b.type==='scenario'){
      // Character picker pills at top
      const pillsHtml = roster.length
        ? roster.map(rc=>`<button class="char-pill" style="background:${rc.color}18;color:${rc.color};border-color:${rc.color}44"
            onclick="addCharFromPill('${sc.id}','${b.id}','${rc.id}')">${esc(rc.name)}</button>`).join('')
        : `<span class="char-pill-empty">No characters in roster yet — add them in the Characters tab</span>`;

      // Char lines
      const charLinesHtml=b.chars.map(c=>{
        const rc=S.roster.find(r=>r.id===c.rosterId);
        const dotColor=rc?rc.color:'var(--text3)';
        return `<div class="char-line-row">
          <div class="char-name-badge">
            <div class="char-dot" style="background:${dotColor}"></div>
            <div class="char-name-text">${esc(c.name)||'<span style="color:var(--text3);font-style:italic;font-size:11px">unnamed</span>'}</div>
          </div>
          <div class="char-dia-cell">
            <textarea class="auto" placeholder="Dialogue or action (*grunts*, etc)..." oninput="setCharLineField('${sc.id}','${b.id}','${c.id}','dialogue',this.value)">${esc(c.dialogue)}</textarea>
            <button class="btn-char-line-del" onclick="delCharLine('${sc.id}','${b.id}','${c.id}')">✕</button>
          </div>
        </div>`;
      }).join('');

      html+=`<div class="block sb-block" data-bid="${b.id}">
        <div class="bh">
          <span class="bl">● Scenario — Character Dialogue</span>
          <button class="btn-bdel" onclick="delBlock('${sc.id}','${b.id}')">✕</button>
        </div>
        <div class="char-picker-bar">
          <span class="char-picker-label">Add:</span>
          ${pillsHtml}
        </div>
        <div style="display:flex">
          <div style="flex:1;border-right:1px solid var(--border)">
            ${charLinesHtml}
            <div class="add-char-line-bar">
              <button class="btn-add-char-line" onclick="addCharLine('${sc.id}','${b.id}')">+ Blank line</button>
            </div>
          </div>
          <div style="width:55%;display:flex;flex-direction:column">
            <div style="display:flex;flex:1">
              <div class="scenario-col" style="flex:1.2">
                <div class="scenario-col-label">Visuals / Draw</div>
                <textarea class="auto" style="padding:10px 12px;width:100%" placeholder="What to draw or animate..." oninput="setBlockField('${sc.id}','${b.id}','visuals',this.value)">${esc(b.visuals)}</textarea>
              </div>
              <div class="scenario-col" style="flex:1">
                <div class="scenario-col-label">Environment</div>
                <textarea class="auto" style="padding:10px 12px;width:100%" placeholder="Setting, background..." oninput="setBlockField('${sc.id}','${b.id}','environment',this.value)">${esc(b.environment)}</textarea>
              </div>
              <div class="scenario-col" style="flex:0.9">
                <div class="scenario-col-label">SFX / Music</div>
                <textarea class="auto" style="padding:10px 12px;width:100%" placeholder="Sound or music cue..." oninput="setBlockField('${sc.id}','${b.id}','sfx',this.value)">${esc(b.sfx)}</textarea>
              </div>
            </div>
          </div>
        </div>
        <div class="timing-row">
          <span class="timing-label">Timing / Pacing</span>
          <input class="timing-inp" type="text" placeholder="e.g. cut fast here, slow this down..." value="${esc(b.timing)}" oninput="setBlockField('${sc.id}','${b.id}','timing',this.value)">
        </div>
      </div>`;
    }
  });

  html+=`<div class="add-area">
    <div class="add-lbl">Add block</div>
    <div class="add-btns">
      <button class="btn-ab btn-ab-n" onclick="addBlock('${sc.id}','narrator')">+ Narrator Block</button>
      <button class="btn-ab btn-ab-s" onclick="addBlock('${sc.id}','scenario')">+ Scenario Block</button>
    </div>
  </div>`;

  main.innerHTML=html;
  initAutoExpand();
}

function renderCreds(main){
  const c=S.credits;
  main.innerHTML=`
    <div class="topbar">
      <span style="font-size:20px;font-weight:700">End Credits</span>
      <div class="nav-grp"><button class="btn-pdf" onclick="exportPDF()">Export All PDF</button></div>
    </div>
    <div class="block cb">
      <div class="bh"><span class="bl">◈ Project Info</span></div>
      <div class="cred-grid">
        <div class="cred-field"><div class="cred-label">Title</div><input type="text" value="${esc(S.title)}" placeholder="Video title..." oninput="S.title=this.value;save();renderSB()"></div>
        <div class="cred-field"><div class="cred-label">Voice Actor (VA)</div><input type="text" value="${esc(S.va)}" placeholder="VA name(s)..." oninput="S.va=this.value;save()"></div>
        <div class="cred-field" style="grid-column:1/-1"><div class="cred-label">Thumbnail description</div><input type="text" value="${esc(S.thumbnail)}" placeholder="What to put on the thumbnail..." oninput="S.thumbnail=this.value;save()"></div>
      </div>
    </div>
    <div class="block cb">
      <div class="bh"><span class="bl">◈ End Credits Content</span></div>
      <div class="cred-grid">
        <div class="cred-field"><div class="cred-label">VA Credits List</div><textarea oninput="setCredField('vas',this.value)">${esc(c.vas)}</textarea></div>
        <div class="cred-field"><div class="cred-label">Discord Plug</div><textarea oninput="setCredField('discord',this.value)">${esc(c.discord)}</textarea></div>
        <div class="cred-field"><div class="cred-label">Comments to Mention</div><textarea oninput="setCredField('comments',this.value)">${esc(c.comments)}</textarea></div>
        <div class="cred-field"><div class="cred-label">Video Description</div><textarea oninput="setCredField('description',this.value)">${esc(c.description)}</textarea></div>
      </div>
    </div>`;
}

load();renderSB();renderMain();
</script>
</body>
</html>
